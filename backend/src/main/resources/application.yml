server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: whu-circle-backend
  profiles:
    active: mock
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 45MB

whu-circle:
  auth:
    allowed-email-domains: whu.edu.cn
    code-expires-in: 300
    code-resend-after: 60
    max-code-attempts: 5
  mail:
    mode: mock
  upload:
    image-dir: ${UPLOAD_IMAGE_DIR:uploads/images}
  storage:
    type: ${STORAGE_TYPE:local}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:whu-circle}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://127.0.0.1:9000}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.whucircle: INFO
